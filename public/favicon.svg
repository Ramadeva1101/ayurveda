<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="lotus-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8935A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9A7845;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Lotus petals -->
  <g fill="none" stroke="url(#lotus-gradient)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Center petal -->
    <path d="M32 8 Q38 20 32 32 Q26 20 32 8" fill="rgba(184,147,90,0.1)" />

    <!-- Petals around center -->
    <path d="M32 12 Q42 20 38 32 Q30 26 32 12" />
    <path d="M32 12 Q22 20 26 32 Q34 26 32 12" />

    <path d="M20 16 Q28 22 34 32 Q24 28 20 16" />
    <path d="M44 16 Q36 22 30 32 Q40 28 44 16" />

    <path d="M14 24 Q24 26 32 32 Q22 30 14 24" />
    <path d="M50 24 Q40 26 32 32 Q42 30 50 24" />

    <!-- Base leaves -->
    <path d="M18 42 Q26 36 32 32 Q24 38 18 42" />
    <path d="M46 42 Q38 36 32 32 Q40 38 46 42" />

    <!-- Water ripples -->
    <path d="M16 48 Q32 44 48 48" stroke-width="1" opacity="0.5" />
    <path d="M20 54 Q32 50 44 54" stroke-width="0.75" opacity="0.3" />
  </g>

  <!-- Center dot -->
  <circle cx="32" cy="28" r="3" fill="url(#lotus-gradient)" opacity="0.8" />
</svg>
